name: liv-retrosphere

services:
  retro-app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: retro-app
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      CONTAINER_ROLE: app
    depends_on:
      retro-mysql:
        condition: service_healthy
      retro-redis:
        condition: service_healthy
    networks:
      - retro-network

  retro-nginx:
    image: nginx:1.28-alpine
    container_name: retro-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - retro-app
    networks:
      - retro-network

  retro-mysql:
    image: mysql:8.4
    container_name: retro-mysql
    restart: unless-stopped
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_TEST_DATABASE: ${DB_TEST_DATABASE:-retro_sphere_testing}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
    volumes:
      - retro-mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/retro.cnf:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - retro-network

  retro-redis:
    image: redis:7-alpine
    container_name: retro-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - retro-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - retro-network

  retro-horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: retro-horizon
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    restart: unless-stopped
    working_dir: /var/www/html
    command:
      - sh
      - -c
      - |
        until [ -f vendor/autoload.php ]; do
          echo "Waiting for Composer dependencies..."
          sleep 2
        done

        until php artisan list --raw | grep -q "^horizon$$"; do
          echo "Waiting for Laravel Horizon to be installed..."
          sleep 5
        done

        exec php artisan horizon
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      CONTAINER_ROLE: horizon
    depends_on:
      retro-app:
        condition: service_started
      retro-mysql:
        condition: service_healthy
      retro-redis:
        condition: service_healthy
    networks:
      - retro-network

  retro-scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: retro-scheduler
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    restart: unless-stopped
    working_dir: /var/www/html
    command:
      - sh
      - -c
      - |
        until [ -f vendor/autoload.php ]; do
          echo "Waiting for Composer dependencies..."
          sleep 2
        done

        exec php artisan schedule:work
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      CONTAINER_ROLE: scheduler
    depends_on:
      retro-app:
        condition: service_started
      retro-mysql:
        condition: service_healthy
      retro-redis:
        condition: service_healthy
    networks:
      - retro-network

  retro-node:
    image: node:22-alpine
    container_name: retro-node
    restart: unless-stopped
    working_dir: /var/www/html
    command:
      - sh
      - -c
      - |
        if [ ! -f package.json ]; then
          echo "Waiting for package.json..."
          while [ ! -f package.json ]; do
            sleep 2
          done
        fi

        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

        exec npm run dev -- --host 0.0.0.0
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html
      - retro-node-modules:/var/www/html/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    networks:
      - retro-network

  retro-mailpit:
    image: axllent/mailpit:latest
    container_name: retro-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - retro-network

networks:
  retro-network:
    name: retro-network
    driver: bridge

volumes:
  retro-mysql-data:
    name: retro-mysql-data

  retro-redis-data:
    name: retro-redis-data

  retro-node-modules:
    name: retro-node-modules